<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(135deg, #1a4a35 0%, #0d2e20 50%, #0a2218 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 64px;
  }
  .triangle-bg {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    height: 320px;
    opacity: 0.18;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo svg { width: 28px; height: 28px; }
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 0 8px;
  }
  .heading {
    font-size: 72px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 16px;
  }
  .heading .green { color: #4ade80; }
  .subtitle {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }
  .pills { display: flex; gap: 12px; }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 100px;
    color: rgba(255,255,255,0.85);
    font-size: 17px;
    font-weight: 500;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-viet  { background: #60a5fa; }
  .dot-nhat  { background: #f87171; }
  .dot-kysis { background: #a78bfa; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="triangle-bg">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 20 L12 3 L21 20 Z" stroke="white" stroke-width="0.7" stroke-linejoin="round" fill="none"/>
      <path d="M8 12 Q12 9.5 16 12" stroke="white" stroke-width="0.7" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 20 L12 3 L21 20 Z"/>
      <path d="M8 12 Q12 9.5 16 12"/>
    </svg>
    nippontokutei.com
  </div>

  <div class="content">
    <div class="heading">
      Tìm việc làm<br>
      <span class="green">Tokutei & Kỹ sư</span><br>
      Nhật Bản
    </div>
    <div class="subtitle">Kết nối người Việt với hàng trăm cơ hội việc làm tại Nhật</div>
  </div>

  <div class="pills">
    <div class="pill"><span class="dot dot-viet"></span>Tokutei đầu Việt</div>
    <div class="pill"><span class="dot dot-nhat"></span>Tokutei đầu Nhật</div>
    <div class="pill"><span class="dot dot-kysis"></span>Kỹ sư</div>
  </div>

</body>
</html>
